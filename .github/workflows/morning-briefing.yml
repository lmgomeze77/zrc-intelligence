name: ZRC Morning Briefing
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ZRC Morning Briefing
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.BRIEFING_ENDPOINT }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60)
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then exit 1; fi
          echo "Briefing dispatched successfully."